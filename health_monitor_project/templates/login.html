{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
    <div class="card auth-card">
        <h1 class="card auth-card">Login</h1>
        
        {% if error %}
         <p class="error">{{ error }}</p>
        {% endif %}
        
        <form method="post">
            {%csrf_token%}
            
            <label>Username or Email address:</label><br>
            <input class="input wide" type ="text" name="username" placeholder="Enter username or email address" required>
            
            <label>Password:</label><br>
            <input class="input wide" type="password" name="password" placeholder="Enter password" required>
            
            <button class="btn big-btn" type="submit">Login</button>
        </form>
        
        <p style="margin-top:16px;">
            Don't have an account?
            <a href="{% url 'signup' %}">Sign Up</a>

        <p style="margin-top:18px;">Forgotten Password?</p>
    </div>
{% endblock %}
